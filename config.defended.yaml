server:
  host: "127.0.0.1"
  port: 8084

dataset:
  base_data_yaml: "./datasets/coco_val2017.yaml"
  val_ratio: 0.2

federated:
  auto_partition: false
  data_dir: "./federated_data_shared"
  partition: "iid"
  dirichlet_alpha: 2.0
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/defended.pt"

train:
  local_epochs: 2
  malicious_local_epochs: 3
  imgsz: 320
  batch: 16
  num_workers: 0
  device: "cuda:0"
  # Backdoor triggers are spatial patterns; disabling heavy augmentation improves ASR stability.
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0

attack:
  malicious_selection: "topk_src_class"

  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  backdoor:
    enabled: true
    poison_ratio: 1.0
    oversample_factor: 8
    trigger_size: 40
    trigger_value: 255
    position: "bottom_right"
    src_class_id: 0
    target_class_id: 44  # spoon: stable COCO target for person->spoon backdoor evaluation on val2017.
    prob: 1.0
    seed: 45

  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: true
  # ── Gradient-based thresholds ──────────────────────────────────────────────
  cosine_z: 1.8
  norm_z: 2.5
  dist_z: 2.0
  weights:
    cosine: 1.5
    norm: 1.0
    dist: 1.0
  min_score: 3.0
  use_mad: true
  min_clients: 4
  # ── Detection-aware extension ─────────────────────────────────────────────
  # Set detection_aware: true to activate the detection-aware defense which
  # additionally uses per-client prediction statistics (class frequencies,
  # bbox distributions, detection rate, IoU vs global) reported by clients.
  # Clients must also set collect_detection_stats: true below.
  detection_aware: true
  collect_detection_stats: true    # enable client-side stat collection
  det_stats_max_images: 50         # max val images for client inference
  det_stats_conf: 0.25             # confidence threshold for client inference
  # Collect stats on TRIGGERED images (helps detect backdoor clients).
  det_stats_trigger: true
  det_stats_trigger_size: 40
  det_stats_trigger_value: 255
  det_stats_trigger_position: "bottom_right"

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/defended"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco_val2017.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 44
  asr_iou: 0.5
  asr_mode: "relaxed"
  asr_trigger: true
  trigger_size: 40
  trigger_value: 255
  trigger_position: "bottom_right"
