server:
  host: "127.0.0.1"
  port: 8084

dataset:
  base_data_yaml: "./datasets/coco128/coco128.yaml"
  val_ratio: 0.2

federated:
  auto_partition: true
  data_dir: "./federated_data_defended"
  partition: "dirichlet"
  dirichlet_alpha: 0.5
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/defended.pt"

train:
  local_epochs: 2
  imgsz: 320
  batch: 4
  device: "cuda:0"
  # Backdoor triggers are spatial patterns; disabling heavy augmentation improves ASR stability.
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0

attack:
  malicious_selection: "topk_src_class"

  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  backdoor:
    enabled: true
    poison_ratio: 0.2
    trigger_size: 16
    trigger_value: 255
    position: "bottom_right"
    src_class_id: 0
    target_class_id: 56
    prob: 1.0
    seed: 45

  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: true
  cosine_z: 1.8
  norm_z: 2.5
  dist_z: 2.0
  weights:
    cosine: 1.5
    norm: 1.0
    dist: 1.0
  min_score: 2.5
  use_mad: true
  min_clients: 4
  # Detection-aware defense: score detection head layers independently.
  # The detection head (last ~20% of parameter tensors in YOLOv8) is the primary
  # target of perception poisoning attacks; analysing it separately and amplifying
  # its weight lets the filter catch subtle head-only poisoning that looks benign
  # when the entire parameter vector is inspected as a whole.
  layer_aware: true
  head_layer_fraction: 0.2
  head_weight_multiplier: 2.0
  # Per-layer norm clipping: clip each client's per-layer delta to this multiple
  # of the per-layer median norm. Disabled by default; enable for stricter defense
  # against large-norm, head-targeted attacks.
  clip_norm: false
  clip_norm_multiplier: 5.0

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/defended"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco128/coco128.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 56
  asr_iou: 0.5
  asr_mode: "strict"
  asr_trigger: true
  trigger_size: 16
  trigger_value: 255
  trigger_position: "bottom_right"
