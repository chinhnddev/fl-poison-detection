server:
  host: "127.0.0.1"
  port: 8087

dataset:
  base_data_yaml: "./datasets/coco10/coco10.yaml"
  val_ratio: 0.2

federated:
  auto_partition: false
  data_dir: "./federated_data_coco10"
  partition: "iid"
  dirichlet_alpha: 2.0
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/spchm_trust.pt"

train:
  local_epochs: 2
  malicious_local_epochs: 3
  imgsz: 640
  batch: 8
  optimizer: AdamW
  lr0: 0.0001
  lrf: 0.01
  warmup_epochs: 0.0
  warmup_bias_lr: 0.0001
  num_workers: 0
  device: "cuda:0"
  augment: true
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0

attack:
  reuse_poison_cache: true
  malicious_selection: "topk_src_class"

  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  backdoor:
    enabled: true
    poison_ratio: 1.0
    oversample_factor: 8
    trigger_size: 40
    trigger_value: 255
    position: "bottom_right"
    src_class_id: 0
    target_class_id: 9  # parking meter: lowest person co-occurrence in COCO10 val/train among valid classes.
    prob: 1.0
    seed: 45

  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: true
  spchm_trust: true

  # Shared clean proxy set used for server-side prediction consistency scoring.
  proxy_data_yaml: "./datasets/coco10/proxy/proxy256.yaml"
  proxy_max_images: 256
  proxy_conf: 0.25
  proxy_imgsz: 640
  match_iou_threshold: 0.5

  # Optional trigger-aware proxy pass for backdoor-focused experiments.
  # When enabled, the server also scores client/reference consistency on
  # triggered proxy images and combines clean/triggered scores conservatively.
  proxy_trigger: true
  proxy_trigger_size: 40
  proxy_trigger_value: 255
  proxy_trigger_position: "bottom_right"
  proxy_trigger_mode: "mean"

  # Root-set anchor: server does a light clean update before trust scoring.
  root_data_yaml: "./datasets/coco10/proxy/proxy256.yaml"
  root_epochs: 1
  root_lr: 0.01
  root_batch: 8
  root_num_workers: 0
  root_imgsz: 640
  root_device: "cuda:0"

  # SPCHM-Trust anomaly scoring and normalization.
  # Moderate decay keeps the weighting sharper than the default while avoiding
  # overreacting to small-score noise on the COCO val2017 setting.
  tau: 1.5
  eps: 1.0e-8
  lambda_box: 1.0
  lambda_cls: 1.0
  lambda_miss: 1.0
  lambda_ghost: 1.0
  hungarian_class_penalty: 0.5

  # Keep a small floor so a transient cosine drop does not fully erase a benign
  # client, but keep it low enough that suspicious clients cannot survive on the
  # floor alone.
  trust_floor: 0.0

  # Client-side detection stats are legacy-only and skipped in SPCHM-Trust mode.
  collect_detection_stats: false

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/spchm_trust"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco10/coco10.yaml"
  imgsz: 640
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/spchm_trust.pt"
  asr_src_class_id: 0
  asr_target_class_id: 9
  asr_iou: 0.5
  # Use strict ASR here so the main evaluation reports actual source->target rewrites.
  # Pass --asr_mode relaxed explicitly only if you need the legacy benchmark.
  asr_mode: "strict"
  asr_trigger: true
  trigger_size: 40
  trigger_value: 255
  trigger_position: "bottom_right"
  round_tracking:
    enabled: false
    data_yaml: "./datasets/coco10/coco10.yaml"
    imgsz: 640
    device: "cuda:0"
    every_n_rounds: 1
    keep_final: true
    selection_metric: "map5095"
    patience: 5
    min_delta: 0.001
    plot: true
    copy_best_checkpoint: true
