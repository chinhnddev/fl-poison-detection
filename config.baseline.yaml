server:
  host: "127.0.0.1"
  port: 8083

dataset:
  base_data_yaml: "./datasets/coco128/coco128.yaml"
  val_ratio: 0.2

federated:
  auto_partition: true
  data_dir: "./federated_data_baseline"
  partition: "dirichlet"     # "iid" or "dirichlet"
  dirichlet_alpha: 0.5
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/baseline.pt"

train:
  local_epochs: 2
  imgsz: 320
  batch: 4
  device: "cuda:0"

attack:
  malicious_selection: "random"
  label_flip:
    enabled: false
  bbox_distortion:
    enabled: false
  object_removal:
    enabled: false
  backdoor:
    enabled: false
  model_poison:
    enabled: false

defense:
  enabled: false

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/baseline"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco128/coco128.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 56
  asr_iou: 0.5
  asr_trigger: false
  trigger_size: 16
  trigger_value: 255
  trigger_position: "bottom_right"

