server:
  host: "127.0.0.1"
  port: 8086

dataset:
  base_data_yaml: "./datasets/coco128/coco128.yaml"
  val_ratio: 0.2

federated:
  auto_partition: true
  data_dir: "./federated_data_da_defended"
  partition: "dirichlet"
  dirichlet_alpha: 0.5
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/da_defended.pt"

train:
  local_epochs: 2
  imgsz: 320
  batch: 4
  device: "cuda:0"
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0

attack:
  malicious_selection: "topk_src_class"

  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  backdoor:
    enabled: true
    poison_ratio: 0.2
    trigger_size: 16
    trigger_value: 255
    position: "bottom_right"
    src_class_id: 0
    target_class_id: 56
    prob: 1.0
    seed: 45

  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: true

  # ── Gradient-based thresholds ─────────────────────────────────────────────
  cosine_z: 1.8
  norm_z: 2.5
  dist_z: 2.0
  weights:
    cosine: 1.5
    norm: 1.0
    dist: 1.0

  # ── Detection-aware extension ─────────────────────────────────────────────
  # Activate the detection-aware defense: clients report class frequency,
  # bbox statistics and detection rate which the server uses as additional
  # anomaly signals on top of gradient-level analysis.
  detection_aware: true

  # Detection-specific thresholds
  class_freq_z: 2.0          # z-score for class-frequency L1 deviation (label-flip signal)
  bbox_z: 2.0                # z-score for bbox distribution deviation  (bbox distortion signal)
  detection_rate_z: 2.0      # |z|-score for dets/image deviation        (removal signal)
  iou_z: 2.0                 # z-score for IoU-vs-global deviation       (geometry signal)

  # Detection scoring weights (higher = stricter for that attack type)
  detection_weights:
    class_freq: 2.0           # high: class flip is the clearest label-flip signal
    bbox: 1.0
    detection_rate: 1.0
    iou: 1.5

  min_score: 2.5
  use_mad: true
  min_clients: 4
  nc: 80                      # number of YOLO detection classes (COCO)

  # Client-side inference settings for detection stat collection
  collect_detection_stats: true  # clients run inference on their val set each round
  det_stats_max_images: 50       # max images per client per round (keeps overhead low)
  det_stats_conf: 0.25           # prediction confidence threshold

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/da_defended"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco128/coco128.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/da_defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 56
  asr_iou: 0.5
  asr_mode: "strict"
  asr_trigger: true
  trigger_size: 16
  trigger_value: 255
  trigger_position: "bottom_right"
