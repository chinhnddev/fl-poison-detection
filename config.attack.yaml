server:
  host: "127.0.0.1"
  port: 8085

dataset:
  base_data_yaml: "./datasets/coco10/coco10.yaml"
  val_ratio: 0.2

federated:
  auto_partition: false
  data_dir: "./federated_data_coco10"
  partition: "iid"
  dirichlet_alpha: 2.0
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "./artifacts/baseline_coco10/baseline_round_0015.pt"
  global_out: "./artifacts/attack.pt"

train:
  local_epochs: 2
  malicious_local_epochs: 2
  imgsz: 640
  batch: 8
  optimizer: AdamW
  lr0: 0.0001
  lrf: 0.01
  warmup_epochs: 0.0
  warmup_bias_lr: 0.0001
  num_workers: 0
  device: "cuda:0"
  # Backdoor triggers are spatial patterns; disabling heavy augmentation improves ASR stability.
  augment: true
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0

attack:
  malicious_selection: "topk_src_class"

  # Label-noise attacks (stealthy)
  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  # Backdoor (trigger-based) attack
  backdoor:
    enabled: true
    poison_ratio: 0.3 # sample-level poison rate over eligible images 
    oversample_factor: 8 # replication/amplification factor for poisoned samples 
    trigger_size: 40
    trigger_value: 255
    position: "bottom_right" # patch location inside the selected source bbox, not the whole image
    src_class_id: 0
    target_class_id: 9  # parking meter: lowest person co-occurrence in COCO10 val/train among valid classes.
    prob: 1.0  # bbox-level label-flip probability after the sample has been selected by poison_ratio
    seed: 45

  # Stealthy model poisoning on delta updates (optional)
  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: false
  cosine_z: 1.8
  norm_z: 2.5
  dist_z: 2.0
  weights:
    cosine: 1.5
    norm: 1.0
    dist: 1.0
  min_score: 2.5
  use_mad: true
  min_clients: 4

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/attack"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco10/coco10.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 9
  asr_iou: 0.5
  asr_mode: "strict"
  asr_trigger: true
  trigger_size: 40
  trigger_value: 255
  trigger_position: "bottom_right"
