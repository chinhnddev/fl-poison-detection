server:
  host: "127.0.0.1"
  port: 8083

dataset:
  base_data_yaml: "./datasets/coco10/coco10.yaml"
  val_ratio: 0.2

federated:
  auto_partition: false
  data_dir: "./federated_data_coco10"
  partition: "iid"
  dirichlet_alpha: 2.0
  min_fit_clients: 10
  min_available_clients: 10
model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/baseline.pt"

train:
  local_epochs: 2
  imgsz: 640
  batch: 8  # Reduce to 8 if CUDA OOM.
  optimizer: AdamW
  lr0: 0.0001
  lrf: 0.01
  warmup_epochs: 0.0
  warmup_bias_lr: 0.0001
  num_workers: 0
  device: "cuda:0"
  # Gentle clean fine-tuning to preserve pretrained YOLOv8s utility on small client shards.
  augment: true
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.5
  flipud: 0.0
  degrees: 0.0
  translate: 0.03
  scale: 0.1
  shear: 0.0
  perspective: 0.0

attack:
  malicious_selection: "random"
  label_flip:
    enabled: false
  bbox_distortion:
    enabled: false
  object_removal:
    enabled: false
  backdoor:
    enabled: false
  model_poison:
    enabled: false

defense:
  enabled: false

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/baseline"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco10/coco10.yaml"
  imgsz: 640
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/defended.pt"
  asr_src_class_id: 0
  asr_target_class_id: 22
  asr_iou: 0.5
  asr_mode: "relaxed"
  asr_trigger: false
  trigger_size: 40
  trigger_value: 255
  trigger_position: "bottom_right"
  round_tracking:
    enabled: true
    data_yaml: "./datasets/coco10/coco10.yaml"
    imgsz: 640
    device: "cuda:0"
    every_n_rounds: 1
    keep_final: true
    selection_metric: "map5095"
    patience: 5
    min_delta: 0.001
    plot: true
    copy_best_checkpoint: true
