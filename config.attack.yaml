server:
  host: "127.0.0.1"
  port: 8085

dataset:
  base_data_yaml: "./datasets/coco128/coco128.yaml"
  val_ratio: 0.2

federated:
  auto_partition: true
  data_dir: "./federated_data_poison"
  partition: "dirichlet"
  dirichlet_alpha: 0.5
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts_poison/attack.pt"

train:
  local_epochs: 2
  imgsz: 320
  batch: 2
  device: "cuda:0"

aggregation:
  krum_byzantine: 1

attack:
  label_flip:
    enabled: true
    src_class_id: 0
    dst_class_id: 16
    prob: 1.0
    seed: 42
  model_poison:
    enabled: false
    strength: 3.0
    mode: "signflip"

defense:
  enabled: false
  cosine_z: 1.0
  norm_z: 2.5
  min_votes: 2

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl_poison"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco128/coco128.yaml"
  asr_src_class_id: 0
  asr_target_class_id: 16
  asr_iou: 0.5
  baseline_model: "./artifacts_poison/baseline.pt"
  attacked_model: "./artifacts_poison/attack.pt"
  defended_model: "./artifacts_poison/defended.pt"

