server:
  host: "127.0.0.1"
  port: 8087

dataset:
  base_data_yaml: "./datasets/coco128/coco128.yaml"
  val_ratio: 0.2
  # Research setting placeholder:
  # base_data_yaml: "./datasets/coco2017/coco2017.yaml"

federated:
  auto_partition: true
  data_dir: "./federated_data_spchm_trust"
  partition: "iid"
  dirichlet_alpha: 2.0
  min_fit_clients: 10
  min_available_clients: 10

model:
  initial_weights: "yolov8n.pt"
  global_out: "./artifacts/spchm_trust.pt"
  # Research setting placeholder:
  # initial_weights: "yolov8s.pt"

train:
  local_epochs: 2
  malicious_local_epochs: 4
  imgsz: 320
  batch: 4
  device: "cuda:0"
  mosaic: 0.0
  mixup: 0.0
  copy_paste: 0.0
  fliplr: 0.0
  flipud: 0.0
  degrees: 0.0
  translate: 0.0
  scale: 0.0
  shear: 0.0
  perspective: 0.0
  # Research setting placeholder:
  # imgsz: 640

attack:
  malicious_selection: "topk_src_class"

  label_flip:
    enabled: false
    poison_ratio: 0.2
    src_class_id: 0
    dst_class_id: 56
    prob: 0.5
    seed: 42

  bbox_distortion:
    enabled: false
    poison_ratio: 0.2
    shift_xy: 0.05
    shift_wh: 0.03
    prob: 0.3
    seed: 43

  object_removal:
    enabled: false
    poison_ratio: 0.2
    target_class_id: 0
    prob: 0.3
    seed: 44

  backdoor:
    enabled: true
    poison_ratio: 1.0
    oversample_factor: 4
    trigger_size: 40
    trigger_value: 255
    position: "bottom_right"
    src_class_id: 0
    target_class_id: 77  # teddy bear: better box-geometry match to person on COCO128 than bowl/chair, and no natural val overlap with person.
    prob: 1.0
    seed: 45

  model_poison:
    enabled: false
    mode: "stealth"
    strength: 1.0
    stealth_beta: 0.1
    max_scale: 2.0
    seed: 46

defense:
  enabled: true
  spchm_trust: true

  # Shared clean proxy set used for server-side prediction consistency scoring.
  proxy_data_yaml: "./datasets/coco128/coco128.yaml"
  proxy_max_images: 0
  proxy_conf: 0.25
  proxy_imgsz: 320

  # Optional trigger-aware proxy pass for backdoor-focused experiments.
  # When enabled, the server also scores client/reference consistency on
  # triggered proxy images and combines clean/triggered scores conservatively.
  proxy_trigger: true
  proxy_trigger_size: 40
  proxy_trigger_value: 255
  proxy_trigger_position: "bottom_right"
  proxy_trigger_mode: "max"

  # Small clean root set used to compute the trusted update direction delta_root.
  root_data_yaml: "./datasets/coco128/coco128.yaml"
  root_epochs: 2
  root_batch: 4
  root_imgsz: 320
  root_device: "cuda:0"

  # SPCHM-Trust anomaly scoring and normalization.
  # Moderate decay keeps the weighting sharper than the default while avoiding
  # overreacting to small-score noise on the COCO128 smoke-test setting.
  tau: 4.0
  eps: 1.0e-8
  lambda_box: 1.0
  lambda_cls: 1.0
  lambda_miss: 1.0
  lambda_ghost: 1.0
  hungarian_class_penalty: 0.5

  # Keep a small floor so a transient cosine drop does not fully erase a benign
  # client, but keep it low enough that suspicious clients cannot survive on the
  # floor alone.
  trust_floor: 0.01

  # Client-side detection stats are legacy-only and skipped in SPCHM-Trust mode.
  collect_detection_stats: false

  # Research setting placeholders:
  # proxy_data_yaml: "./datasets/coco2017/coco2017.yaml"
  # root_data_yaml: "./datasets/coco2017/coco2017.yaml"
  # proxy_max_images: 256
  # root_imgsz: 640

runtime:
  tmp_dir: "./tmp"
  train_runs_dir: "./runs_fl/spchm_trust"
  seed: 1234

eval:
  run_after_experiment: false
  data_yaml: "./datasets/coco128/coco128.yaml"
  baseline_model: "./artifacts/baseline.pt"
  attacked_model: "./artifacts/attack.pt"
  defended_model: "./artifacts/spchm_trust.pt"
  asr_src_class_id: 0
  asr_target_class_id: 77
  asr_iou: 0.5
  # Default to relaxed for parity with the legacy attack-only benchmark. Run a
  # second evaluation with --asr_mode strict when you want a stricter check that
  # the trigger is actually flipping source objects into the target class.
  asr_mode: "relaxed"
  asr_trigger: true
  trigger_size: 40
  trigger_value: 255
  trigger_position: "bottom_right"
